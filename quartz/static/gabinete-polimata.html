const N={einSofAur:{l:"EIN SOF AUR",g:"\u2605",s:"The Script of All and Everything",d:"Documento mais antigo do ecossistema. Paradigma epistemologico que: (1) converge conhecimentos de todas as areas; (2) processa dados em 7000+ linguas; (3) interface via sensores mecatronicos (TI+TA); (4) integra todas as linguagens. IDE como cerebro ciborgue cibernetic. GENEALOGIA: Ein Sof - Beit Or - Script of All - Semiografia/Poligrafia - IDE - codeiOgraph - sensores - stack analogica-digital - convergencia - Segunda Escola de Toledo.",a:"#d4af37",m:"#1a1200"},deepHub:{l:"DEEP HUB PAPER",g:"\u25CE",s:"4 campos, raizes semiticas, 7 niveis",d:"Segundo documento mais antigo. Formula os 4 campos do conhecimento (Filosofias, Tradicoes Espirituais, Ciencias, Artes), raizes semanticas (modelo semitico), 7 niveis de interpretacao, 3 relacoes de concordancia. GENEALOGIA: 4 campos - 5 instancias do IMIP - Morfologia Harmonica - 7 niveis - GuruDev TTM - Hubstry Deep Tech.",a:"#b8860b",m:"#120a00"},motoPerpetuo:{l:"MOTO PERPETUO",g:"\u221E",s:"Principio autoral gerador",d:"Inflexao do pensamento humano incidindo sobre o conjunto universo dos fenomenos, em intersecao com stacks tecnologicas analogicas e digitais, instanciando-se em paralelo ou serie em multiplas areas do conhecimento como na tradicao pancronica dos polimatas, em comparacao e contraste sistematicos operada pela analogia - heuristica, funcional ou homologia - em um fluxo continuo de pesquisa, estudo, criacao, ensino e producao economica.",a:"#c9a84c",m:"#2a1f05"},reineSprache:{l:"REINE SPRACHE",g:"\u03BB",s:"Basso ostinato universal - Benjamin",d:"A linguagem da natureza - fisica e metafisica - da qual toda escrita humana e traducao. Principio transversal que sustenta Naturaglia, Hierourgia e Poligrafia como variacoes sobre um ostinato comum.",a:"#9b7a1a",m:"#1a1204"},imip:{l:"IMIP",g:"\u03A8",s:"Instancia Multipla Integrada do Pensamento",d:"O sujeito cognitivo opera em cinco instancias: cientifica (-Semiografia) - artistica (-Marcabru Aiara) - espiritual universalista modo Ramakrishna nao sincretismo (-Teografia) - filosofica (-Naturaglia) - empreendedora start-up mode como ignicao nao dogma (-Hubstry). Heteronimos como artefatos cognitivos externos (Clark) e protocolo endogeno de risco psicossocial (Dejours/NR-1).",a:"#4a9e6e",m:"#051409"},beitOr:{l:"BEIT OR EIN SOF",g:"\u2726",s:"Casa da Luz do Infinito",d:"Meta-projeto civilizacional conduzido por Ezra ben Sefarad (tradicao hebraico-sefardita/cabalistica) e Ra'uf ibn Hadi al-Andalusi (tradicao arabe-islamica/Ikhwan al-Safa). Locus: Toledo. Produz: Poligrafia - Segunda Escola de Toledo - Sprachlehre - Lexico Poligrafico - Genealogia Gerativa.",a:"#7070dd",m:"#05050f"},semiografia:{l:"SEMIOGRAFIA",g:"\u03C3",s:"Manifesto (fev/2026) + sistema axiomático (abr/2026, 441p)",d:"VERSAO I (fev/2026, DOI 10.5281/zenodo.18802603): Gesto dual de inventario pancronico e prospeccao. VERSAO II (abr/2026, 441p): Sistema axiomático sobre matrizes n-dimensionais. 7 axiomas: Corporificacao - Operabilidade - Triade - Vazio Posicional - Extensibilidade por Frame - Nao-Trivialidade Paraconsistente - Analogia Operativa. Operador Psi = formalizacao matematica do Moto Perpetuo.",a:"#c87040",m:"#140802"},morfossemiografia:{l:"MORFOSSEMIOGRAFIA",g:"\u03BC",s:"O Morfema Afixal como Operador Epistemologico",d:"Primeiro desdobramento da Semiografia. Morfema afixal como operador epistemologico. Cinco limiares de cristalizacao: territorial - memorial - ritual - identitario - institucional. Protocolo de 5 passos. Bachelard, Greenberg/Comrie, Milton Santos. Framework computacional em 3 camadas.",a:"#c87040",m:"#140802"},poligrafia:{l:"POLIGRAFIA",g:"\u041F",s:"Genero da escrita autoral",d:"Literatura multilingue e simultanea em multiplas camadas de materialidade. Opera por intersecao (teoria dos conjuntos), ritornello (D&G) e translacao interepistemica (reine Sprache). Output do Beit Or Ein Sof. Designa o genero formal de todo o ecossistema.",a:"#7070dd",m:"#05050f"},segundaEscola:{l:"SEGUNDA ESCOLA DE TOLEDO",g:"\u2696",s:"Arquitetura institucional - 10 cadeiras",d:"Direito - Guerra - Historia - Filosofia - Artes e Oficios - Ciencias - Gramatica e Ciencias da Linguagem - Comercio e Economia - Tradicoes Espirituais/Teografia - Educacao e Formacao.",a:"#7070dd",m:"#05050f"},sprachlehre:{l:"SPRACHLEHRE - TTM",g:"\u2202",s:"Doutrina da Lingua - DOI 10.5281/zenodo.19056387",d:"Teoria Tridimensional do Morfema: largura (combinatorio-derivacional) - profundidade (hermeneutico-semantico) - altura grafica (suprassegmental-escritural). Corpus: arabe, hebraico, sanscrito, mandarim, russo, tupi. Hermeneuticas: PaRDeS, Quadriga, Zahir/Batin, Saptavidha.",a:"#7070dd",m:"#05050f"},naturaglia:{l:"NATURAGLIA",g:"\u03A9",s:"Horizonte ontologico + Projeto filosofico do IMIP",d:"Papel duplo: (1) horizonte ontologico de fundo - cinco Naturabilia como condicao de possibilidade de qualquer pesquisa; (2) instancia filosofica do IMIP. Reunificacao: ciencia natural - filosofia natural - historia natural - direito natural - teologia natural. Forma: passacaglia.",a:"#3a9a5a",m:"#021008"},grammath:{l:"GRAMMATH",g:"\u0393",s:"Universal Grammar of Experience",d:"Gramatica universal da experiencia: organiza fenomenos tal como comparecem aos sentidos humanos, sensores de maquinas, intuicao, razao, imaginacao e processos computacionais. Universalidade aristotelica. Naturaglia fornece a ontologia; Grammath fornece a epistemologia operacional.",a:"#5a9ab0",m:"#02080e"},hpg:{l:"HPG 1.0",g:"\u224B",s:"Harmonic Protocol Grid - DOI 10.5281/zenodo.18652888",d:"Framework de comunicacao multicanal para sistemas embarcados. Omnigrid Harmonico 2D com 97 canais unicos (totiente de Euler, N=16). Harmonic Security Layer (HSL). Convergencia: musica das esferas (Naturaglia) - stack analogica-digital.",a:"#3a9a5a",m:"#021008"},teografia:{l:"TEOGRAFIA",g:"\u03B8",s:"Campo: literaturas espirituais",d:"Iniciativa epistemologica de pesquisa, estudo, criacao e ensino das literaturas espirituais da humanidade - escritas, orais, rituais e performativas. Universalismo critico. Equivalencia oral/escrito. Nona cadeira da Segunda Escola de Toledo.",a:"#a060c0",m:"#0a0412"},
hierourgia:{l:"HIEROURGIA",g:"\u210C",s:"Primeira obra teografica sistematica",d:"hieros + ergon - a obra que faz a obra sagrada: descreve e produz o logos operativo sacro simultaneamente. Seis valencias: teurgia - demiurgia - taumaturgia - dramaturgia - magia natural - magia cerimonial. Corpora: PGM, Picatrix, Jamblico, Agrippa, patristica, homiletica.",a:"#a060c0",m:"#0a0412"},urgias:{l:"AS SEIS VALENCIAS",g:"\u2B21",s:"Hexagono operativo da Hierourgia",d:"Teurgia (theos+ergon) - Demiurgia (demios+ergon) - Taumaturgia (thauma+ergon) - Dramaturgia (drama+ergon) - Magia Natural (simpatias ocultas) - Magia Cerimonial (PGM, Picatrix, Clavicula). Invariante pancronico: a enunciacao eficaz.",a:"#a060c0",m:"#0a0412"},marcabru:{l:"MARCABRU AIARA",g:"\u2712",s:"Heteronimo artistico-literario - desde 2017",d:"Identidade artistico-literaria exclusiva: dramaturgia hospitalar (2014-16) - poesia - musica original - teoria musical - IA em musica. Industria criativa. Rio de Janeiro como locus territorial.",a:"#cc5050",m:"#100202"},grauZero:{l:"GRAU ZERO / IMT",g:"\u2300",s:"Semiotica do manuscrito",d:"Grau Zero do Traco: manuscrito em estado liminar anterior a qualquer codificacao - modo autonomo de producao semiotica (Peirce, Barthes, Morin). Instancia Minima Tripla: um unico gesto cursivo instancia (2), (l) e (h).",a:"#cc5050",m:"#100202"},gurudev:{l:"GURUDEV",g:"\u2318",s:"Ontolinguagem - github.com/marcabru-tech",d:"Computar e, antes de tudo, interpretar. ONTOLINGUAGEM: nao representa o ser - co-institui mundos computaveis. PROCESSADOR SEMANTICO TRIDIMENSIONAL: pensamento analogico x semiose peirceana x hermeneutica N1-N7. GURUMATRIX[i][j][k][t][l] 5D. MVP: 25 testes, GuruDVM, CLI, EBNF.",a:"#cc5050",m:"#100202"},morfHarmonica:{l:"MORFOLOGIA HARMONICA",g:"\u266B",s:"Campo fundado 22/jan/2026",d:"Campo cujo objeto e a estrutura morfologica universal em dominios distintos: linguistico, musical, geometrico, mineral, vegetal e animal. 13 postulados com criterios de falseabilidade. Hipotese: shape space (Kendall) - chord space (Tymoczko) via funtor.",a:"#e8a030",m:"#180e00"},codeiOgraph:{l:"codeiOgraph",g:"\u2388",s:"Plataforma de hermeneutica computacional",d:"O codigo-fonte e texto semiotico-normativo que objetiva pensamento analogico. Interpretar codigo e reconstruir o pensamento - Savigny. AGI e antes de tudo um problema hermeneutico. Arquitetura: Grid semiotico do codigo - Motor de analogia - Savigny Engine - Grafo de pensamento.",a:"#50a0d0",m:"#020c14"},vvvGrid:{l:"GRID VERBI-VOCO-VISUAL",g:"\u03B2",s:"Semiose tridimensional da lingua natural",d:"Axioma: L = (verbi, voco, visual). Tres dimensoes cooriginarias: verbi (logos) - voco (corporeidade) - visual (espacializacao). Valor zero estrutural. Isomorfismo com TTM e com processador semantico do GuruDev.",a:"#a080d0",m:"#08040e"},inoffshore:{l:"IN||OFF SHORE",g:"\u2016",s:"Plataforma de exploracao de dados",d:"Plataforma de coleta, descoberta, exploracao, mineracao e tratamento de dados - analoga a exploracao de petroleo offshore. Analogia: sismica - scraping - perfuracao - extracao estruturada - refino - ETL.",a:"#2060a0",m:"#010608"},solomon:{l:"SOLOMON BUSINESS",g:"\u25C6",s:"Startup - reposicionamento digital de heritage",d:"Missao: reposicionar negocios locais e tradicionais no mundo digital, preservando seus valores fundadores. Morfossemiografia aplicada a negocios. B2B para PMEs com historia e heritage.",a:"#906020",m:"#0e0800"},almanaque:{l:"ALMANAQUE GURUDEV",g:"\u2299",s:"Formato editorial - Polyograph Press",d:"Inspirado nos almanaques do inicio do sec. XX - repositorio heterogeneo com navegacao nao-linear, otica polimata e poliglota. Gabinete do Polimata = versao digital viva do Almanaque. DODECALOGO: 12 campos de formacao integral.",a:"#c0a030",m:"#120e00"},lexicoPoligrafico:{l:"LEXICO POLIGRAFICO",g:"\u039B",s:"Neologismos constitutivos do ecossistema",d:"Repositorio de neologismos constitutivos. Verbetes publicados: ONTOLINGUAGEM - HIEROURGIA - ZIETTE. Verbetes previstos: paleobibliofilia - paleolexicosofia - morfossemiografia - semiografia - naturaglia - teografia. Clique para ver o painel completo.",a:"#d4af37",m:"#1a1200"},lexiograph:{l:"LEXIOGRAPH",g:"\u039B",s:"Startup pre-seed - fundada 2023",d:"Startup pre-seed fundada em 2023. Entidade institucional da faixa formal-computacional. Abriga: Semiografia v.0 - codeiOgraph - GuruDev - Grammath. Lexiograph Deep Design - o design do lexico e dos sistemas formais como produto.",a:"#70a070",m:"#041004"},institutoPCIH:{l:"INSTITUTO PCIH3",g:"\u25C8",s:"Polymath Cyborg Intelligence Hub",d:"Vocacao ICT/publica para acesso a financiamento institucional e pesquisa. Interface do ecossistema com o sistema nacional de CT&I. Clausula etica inegociavel: sem licenciamento para armas autonomas de IA ou vigilancia de cidadaos.",a:"#4080b0",m:"#020810"},hubstry:{l:"HUBSTRY - TRADEFLOW",g:"\u2699",s:"Producao economica - fundado 2023",d:"Hubstry Deep Tech (2023): CaaS em Rust para ECA Digital (Lei 15.211/2025), Fly.io GRU. TradeFlow: automacao de comercio exterior. Agencia Laos: design + IoT. Producao economica como dimensao constitutiva do moto perpetuo.",a:"#4080b0",m:"#020810"},om3:{l:"OM3",g:"\u2715",s:"Ordem Mundial Mercante Multimodal",d:"Empresa global de servicos estrategicos com vocacao multinacional. Missao: comercio como instituicao civilizatoria. Modais: maritimo, fluvial, rodoviario, ferroviario e aereo. Logo: X duplo em circulo bronzeado.",a:"#b8860b",m:"#120a00"},vvvServices:{l:"VVV MICROSERVICES",g:"\u03B2",s:"Tres microservicos em Go",d:"Implementacao do Grid Verbi-Voco-Visual como tres microservicos em Go: verbi-service (NLP) - voco-service (audio) - visual-service (imagem/OCR). Gateway: codeiOgraph. Runtime: GuruDev. Infra: Fly.io GRU.",a:"#a080d0",m:"#08040e"},axioma:{l:"AXIOMA DA GURUDEV",g:"\u03A8",s:"Principio fundacional computacional",d:"[l] = Psi(Phi_ctx, Phi_comp). Linha minima l = expressao atomica com efeito observavel nao decomponivel sem perda de intencao. Oito espaco

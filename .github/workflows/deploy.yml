name: Deploy Quartz to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Quartz
        run: |
          git clone https://github.com/jackyzha0/quartz.git _quartz
          cd _quartz
          npm install

      - name: Copy content
        run: |
          rsync -av \
            --exclude='.obsidian' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_quartz' \
            --exclude='customizations' \
            --exclude='*.tmp' \
            ./ _quartz/content/

      - name: Copy config
        run: |
          cp quartz.config.ts _quartz/quartz.config.ts

      - name: Apply Deep Tech customizations (overlay)
        run: |
          # Sobrepõe arquivos do Quartz com nossas versões customizadas:
          # - quartz.layout.ts (homepage Hero + ScrollReveal)
          # - quartz/styles/custom.scss (paleta, glassmorphism, bento, etc.)
          # - quartz/components/Hero.tsx + ScrollReveal.tsx + index.ts
          # - quartz/components/scripts/*.inline.ts
          if [ -d customizations ]; then
            echo "Applying customizations overlay…"
            cp -rv customizations/. _quartz/
          else
            echo "No customizations directory, skipping overlay."
          fi

      - name: Build
        run: |
          cd _quartz
          npx quartz build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_quartz/public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

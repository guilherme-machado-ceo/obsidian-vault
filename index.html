                            {isOut?"→":"←"} {o.label}
                          </div>
                          <div style={{ fontSize:9, color:`${o.accent}50`, fontStyle:"italic", marginTop:1 }}>
                            {o.sublabel.split("·")[0].trim()}
                          </div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              )}

              {active && (
                <button onClick={()=>setActive(null)} style={{ marginTop:24, width:"100%",
                  padding:"8px", border:`1px solid ${BORDER}`, background:"transparent",
                  color:MUTED, fontSize:9, letterSpacing:3, textTransform:"uppercase",
                  cursor:"pointer", borderRadius:2, outline:"none" }}>
                  Limpar seleção ×
                </button>
              )}
            </div>
          ) : (
            <div style={{ padding:"36px 28px" }}>
              <div style={{ fontSize:9, letterSpacing:5, color:MUTED,
                textTransform:"uppercase", marginBottom:24 }}>Legenda</div>
              {[
                ["#c9a84c","Princípio gerador","Moto Perpétuo"],
                ["#9b7a1a","Basso ostinato","Reine Sprache"],
                ["#4a9e6e","Teoria do sujeito","IMIP"],
                ["#7070dd","Projeto civilizacional","Beit Or Ein Sof"],
                ["#c87040","Método / ferramenta","Semiografia et al."],
                ["#3a9a5a","Horizonte ontológico","Naturaglia"],
                ["#a060c0","Campo teográfico","Teografia / Hierourgia"],
                ["#cc5050","Heterônimo / criação","Marcabrü Aiara"],
                ["#4080b0","Institucional / econômico","PCIHᶟ / Hubstry"],
              ].map(([c,l,s])=>(
                <div key={l} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:11 }}>
                  <div style={{ width:10, height:10, borderRadius:1, background:c, flexShrink:0 }}/>
                  <div>
                    <div style={{ fontSize:11, color:FAINT }}>{l}</div>
                    <div style={{ fontSize:9, color:MUTED, fontStyle:"italic" }}>{s}</div>
                  </div>
                </div>
              ))}
              <div style={{ marginTop:28, padding:"16px", border:`1px solid ${BORDER}`,
                borderRadius:2, fontSize:11, color:MUTED, lineHeight:1.7, fontStyle:"italic" }}>
                Clique em qualquer nó para expandir sua descrição e visualizar conexões no ecossistema.
              </div>
            </div>
          )}
        </aside>
      </div>

      <style>{`
        @keyframes bp { 0%,100%{opacity:.25} 50%{opacity:.85} }
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:#2a2010;border-radius:2px}
      `}</style>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(GabinetePolimata));
</script>
</body>
</html>
